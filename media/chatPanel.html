<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none';
                   img-src vscode-resource: https: data:;
                   script-src 'nonce-{{NONCE}}';
                   style-src 'unsafe-inline';
                   font-src vscode-resource:;" />
    <title>dscli Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 32px;
            padding: 0 12px;
            background: var(--vscode-titleBar-activeBackground, #252526);
            border-bottom: 1px solid var(--vscode-input-border);
            flex-shrink: 0;
        }

        #toolbar-path {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            min-width: 0;
        }

        #toolbar-path:hover {
            color: var(--vscode-editor-foreground);
        }

        #toolbar-path .folder-icon {
            flex-shrink: 0;
        }

        #cwdText {
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        #toolbar-change {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--vscode-textLink-foreground, #007acc);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }

        #toolbar-change:hover {
            background: var(--vscode-toolbar-hoverBackground, rgba(90,93,94,0.31));
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }

        .assistant-message {
            align-self: flex-start;
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
        }

        .system-message {
            align-self: center;
            background: var(--vscode-editor-inactiveSelectionBackground);
            font-size: 13px;
            text-align: center;
            max-width: 90%;
        }

        .error-message {
            border: 1px solid var(--vscode-errorForeground);
            color: var(--vscode-errorForeground);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .message-content {
            font-size: 14px;
        }

        .message-content pre {
            background: var(--vscode-textCodeBlock-background);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .message-content code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
        }

        #status {
            text-align: center;
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            padding: 4px;
            min-height: 20px;
        }

        .input-area {
            border-top: 1px solid var(--vscode-input-border);
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #input {
            flex: 1;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 8px;
            padding: 10px 14px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            min-height: 40px;
            max-height: 200px;
            outline: none;
        }

        #input:focus {
            border-color: var(--vscode-focusBorder);
        }

        .buttons {
            display: flex;
            gap: 4px;
        }

        button {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }

        button.secondary:hover {
            background: var(--vscode-button-secondaryHoverBackground);
        }

        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 12px;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--vscode-editor-foreground);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <div id="toolbar-path">
            <span class="folder-icon">📂</span>
            <span id="cwdText">加载中...</span>
        </div>
        <button id="toolbar-change">切换</button>
    </div>
    <div id="messages"></div>
    <div id="status"></div>
    <div class="input-area">
        <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        <div class="buttons">
            <button id="sendBtn">发送</button>
            <button class="secondary hidden" id="stopBtn">停止</button>
        </div>
    </div>

    <script nonce="{{NONCE}}">
        const vscode = acquireVsCodeApi();
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');
        const cwdTextEl = document.getElementById('cwdText');
        const toolbarPathEl = document.getElementById('toolbar-path');
        const toolbarChangeEl = document.getElementById('toolbar-change');

        let isProcessing = false;
        let currentStreamId = null;

        // 工具栏：点击路径或"切换"按钮切换工作目录
        toolbarPathEl.addEventListener('click', function() {
            vscode.postMessage({ command: 'changeDirectory' });
        });
        toolbarChangeEl.addEventListener('click', function() {
            vscode.postMessage({ command: 'changeDirectory' });
        });

        // 自动调整输入框高度
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
        });

        // 键盘事件
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        // 按钮事件（使用 addEventListener 符合 CSP 策略）
        sendBtn.addEventListener('click', () => send());
        stopBtn.addEventListener('click', () => stop());

        function send() {
            const content = inputEl.value.trim();
            if (!content || isProcessing) { return; }

            appendMessage('user', content);
            inputEl.value = '';
            inputEl.style.height = 'auto';

            vscode.postMessage({ command: 'sendMessage', content: content });
            setProcessing(true);
        }

        function stop() {
            vscode.postMessage({ command: 'interrupt' });
            setProcessing(false);
            if (currentStreamId) {
                finalizeStreamMessage(currentStreamId);
            }
        }

        function getRoleLabel(role) {
            var labels = { 'assistant': 'dscli', 'user': 'you', 'system': 'system' };
            return labels[role] || role;
        }

        function appendMessage(role, content, isError) {
            var div = document.createElement('div');
            div.className = 'message ' + role + '-message' + (isError ? ' error-message' : '');
            div.innerHTML =
                '<div class="message-header"><span>' + escapeHtml(getRoleLabel(role)) + '</span><span>' + new Date().toLocaleTimeString() + '</span></div>' +
                '<div class="message-content">' + formatContent(content) + '</div>';
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function createStreamMessage(id, role, content) {
            currentStreamId = id;
            var div = document.createElement('div');
            div.id = 'stream-' + id;
            div.className = 'message ' + role + '-message';
            div.innerHTML =
                '<div class="message-header"><span>' + escapeHtml(getRoleLabel(role)) + '</span><span>' + new Date().toLocaleTimeString() + '</span></div>' +
                '<div class="message-content">' + formatContent(content) + '</div>';
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function updateStreamMessage(id, content) {
            const div = document.getElementById('stream-' + id);
            if (div) {
                div.querySelector('.message-content').innerHTML = formatContent(content);
                scrollToBottom();
            }
        }

        function finalizeStreamMessage(id) {
            currentStreamId = null;
        }

        /**
         * 简易 Markdown 渲染
         * XSS 安全：escapeHtml() 先执行，正则仅插入固定标签
         * 无模板字符串转义 — 本文件作为原始文本加载
         */
        function formatContent(content) {
            let html = escapeHtml(content);

            // 代码块：```lang\n...\n```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            // 行内代码：`code`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            // 粗体：**text**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            // 斜体：*text*
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            // 换行
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setProcessing(processing) {
            isProcessing = processing;
            sendBtn.disabled = processing;
            if (processing) {
                stopBtn.classList.remove('hidden');
            } else {
                stopBtn.classList.add('hidden');
            }
        }

        function setStatus(text) {
            statusEl.textContent = text;
        }

        // 处理来自扩展宿主的消息
        window.addEventListener('message', function(event) {
            const msg = event.data;
            switch (msg.command) {
                case 'addMessage':
                    appendMessage(msg.role, msg.content, msg.isError);
                    setProcessing(false);
                    inputEl.focus();
                    break;

                case 'addStreamMessage':
                    createStreamMessage(msg.id, msg.role, msg.content);
                    break;

                case 'updateStreamMessage':
                    updateStreamMessage(msg.id, msg.content);
                    break;

                case 'finalizeStreamMessage':
                    finalizeStreamMessage(msg.id);
                    setProcessing(false);
                    inputEl.focus();
                    break;

                case 'setStatus':
                    setStatus(msg.content);
                    break;

                case 'setCwd':
                    cwdTextEl.textContent = msg.path;
                    cwdTextEl.title = msg.fullPath;
                    break;
            }
        });
    </script>
</body>
</html>
